name: Publish to npm

on:
    push:
        branches: [main]
    workflow_dispatch:

# Minimal permissions — id-token is the only addition required for OIDC.
permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        # "npm" environment can be configured in repo settings with protection
        # rules (e.g. require manual approval) for an extra safety gate.
        environment: npm

        steps:
            - uses: actions/checkout@v4

            # registry-url tells npm which registry to target.
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  registry-url: 'https://registry.npmjs.org'

            # setup-node writes an empty _authToken placeholder into .npmrc.
            # Any _authToken entry (even blank) blocks npm's native OIDC token
            # exchange (Trusted Publishing). Remove it so OIDC takes over.
            - name: Clear npm auth token placeholder
              run: npm config delete //registry.npmjs.org/:_authToken

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            # Stamp the datebased version into package.json.
            # Format: 0.YYYYMMDD.<run-number>  (e.g. 0.20260313.42)
            - name: Set version
              run: |
                  VERSION="0.$(date -u +%Y%m%d).${{ github.run_number }}"
                  npm version "$VERSION" --no-git-tag-version
                  echo "VERSION=$VERSION" >> "$GITHUB_ENV"

            - name: Install dependencies
              run: bun install --frozen-lockfile

            # OIDC Trusted Publishing — no secrets required.
            # --provenance adds a SLSA attestation (requires id-token: write).
            - name: Publish
              run: npm publish --provenance --access public
