name: Publish to npm

on:
    push:
        branches: [main]
    workflow_dispatch:

# Minimal permissions — id-token is the only addition required for OIDC.
permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        # "npm" environment can be configured in repo settings with protection
        # rules (e.g. require manual approval) for an extra safety gate.
        environment: npm

        steps:
            - uses: actions/checkout@v4

            # Set up Node/npm first so `npm version` and `npm publish` are available.
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  registry-url: 'https://registry.npmjs.org'

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            # Stamp the datebased version into package.json.
            # Format: 0.YYYYMMDD.<run-number>  (e.g. 0.20260313.42)
            - name: Set version
              run: |
                  VERSION="0.$(date -u +%Y%m%d).${{ github.run_number }}"
                  npm version "$VERSION" --no-git-tag-version
                  echo "VERSION=$VERSION" >> "$GITHUB_ENV"

            - name: Install dependencies
              run: bun install --frozen-lockfile

            # Authentication strategy:
            #
            # BOOTSTRAP (first publish only):
            #   Set NPM_TOKEN secret in repo → Actions → Secrets.
            #   Once the package exists on npmjs.com, configure Trusted Publishing:
            #     npmjs.com → package → Settings → Publishing → Trusted Publishers
            #       Provider   : GitHub Actions
            #       Owner      : Foorack
            #       Repository : kumidocs
            #       Workflow   : publish.yml
            #       Environment: npm
            #   Then delete the NPM_TOKEN secret — OIDC takes over from that point.
            #
            # STEADY STATE (after Trusted Publishing is configured):
            #   OIDC handles auth automatically — no secrets stored anywhere.
            #   --provenance adds a SLSA attestation (requires id-token: write).
            - name: Publish
              run: npm publish --provenance --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
